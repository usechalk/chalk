name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # GitHub deprecated Node 20 runners for JS actions; force the new
  # Node 24 runtime even on action versions that still default to 20.
  # Drop this once every action below has bumped to a Node-24 default
  # release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Check, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      # ubuntu-latest ships with ~14 GB free; Wave B grew our cache (target
      # debug+release across 10 crates, several large transitive deps) past
      # what fits during restore, surfacing as "No space left on device"
      # while the cache action wrote its diagnostics. Drop the preinstalled
      # Android/.NET/Haskell stuff we don't use to claw back ~25 GB.
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Cache the cargo registry/git only — `target/` had grown to multiple
      # GB and restoring it ate the disk we just freed. Cold target builds
      # cost ~1-2 minutes with the registry warm, which is the right
      # trade-off.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Build release
        run: cargo build --release
