# Synced with .github/workflows/cargo-audit.yml so local `cargo audit` matches CI.
[advisories]
ignore = [
    # rustls-pemfile unmaintained (transitive dev-dep via testcontainers/bollard).
    "RUSTSEC-2025-0134",
    # tokio-tar PAX header smuggling (transitive dev-dep via testcontainers/bollard).
    "RUSTSEC-2025-0111",
    # rsa Marvin Attack — applies to decryption only; we use rsa for OIDC
    # JWK generation + signing only. No upstream fix exists.
    "RUSTSEC-2023-0071",
]
