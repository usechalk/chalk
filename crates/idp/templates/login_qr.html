<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Badge Login</title>
    <style>
        @font-face{font-family:'Bricolage Grotesque';src:url('/static/bricolage-grotesque.woff2') format('woff2');font-weight:200 800;font-display:swap;font-style:normal}
        * { box-sizing: border-box; }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(120% 80% at 50% -10%, #eef2ff, #fff 60%);
            color: #0f172a;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 21rem;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 4px 16px rgba(15,23,42,.08);
            padding: 2rem 1.75rem;
            text-align: center;
        }
        h1 {
            font-family: 'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif;
            letter-spacing: -0.02em;
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 .75rem;
            color: #0f172a;
        }
        p { color: #475569; margin: 0 0 .5rem; }
        form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        input {
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: .5rem;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,.15);
        }
        button {
            padding: 12px;
            font-size: 16px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: .5rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            margin-top: 1.1rem;
        }
        button:hover { background: #4338ca; }
        a { color: #4f46e5; text-decoration: none; display: block; margin-top: 20px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>QR Badge Login</h1>
        <p>Scan your badge or enter the badge code below.</p>
        <form method="POST" action="/idp/login/qr">
            <input type="text" name="badge_token" placeholder="Badge Token" required>
            <button type="submit">Sign In</button>
        </form>
        <a href="/idp/login">Back to Login</a>
    </div>
</body>
</html>
