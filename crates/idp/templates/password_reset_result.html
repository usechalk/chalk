<style>@font-face{font-family:'Bricolage Grotesque';src:url('/static/bricolage-grotesque.woff2') format('woff2');font-weight:200 800;font-display:swap;font-style:normal}</style>
{% if let Some(err) = error %}
<div style="margin-top: 10px; padding: 12px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: .5rem; font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <div style="font-family: 'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.02em; font-size: 13px; color: #b91c1c; font-weight: 600; margin-bottom: 6px;">
        Password reset for {{ student_name }}
    </div>
    <div style="font-size: 14px; color: #b91c1c; padding: 8px 0;">
        {{ err }}
    </div>
    <button onclick="this.parentElement.remove()"
            style="margin-top: 6px; background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; font-family: inherit; text-decoration: underline;">
        dismiss
    </button>
</div>
{% else %}
<div style="margin-top: 10px; padding: 12px 16px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: .5rem; font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <div style="font-family: 'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.02em; font-size: 13px; color: #15803d; font-weight: 600; margin-bottom: 6px;">
        Password reset for {{ student_name }}
    </div>
    <div style="font-size: 22px; font-family: 'Courier New', monospace; font-weight: 600; color: #15803d; letter-spacing: 0.05em; padding: 8px 0;">
        {{ new_password }}
    </div>
    <button onclick="this.parentElement.remove()"
            style="margin-top: 6px; background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; font-family: inherit; text-decoration: underline;">
        dismiss
    </button>
</div>
{% endif %}
