<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Password Login</title>
    <style>
        @font-face{font-family:'Bricolage Grotesque';src:url('/static/bricolage-grotesque.woff2') format('woff2');font-weight:200 800;font-display:swap;font-style:normal}
        * { box-sizing: border-box; }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(120% 80% at 50% -10%, #eef2ff, #fff 60%);
            color: #0f172a;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 30rem;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 4px 16px rgba(15,23,42,.08);
            padding: 2rem 1.75rem;
        }
        h1 {
            font-family: 'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif;
            letter-spacing: -0.02em;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin: 0 0 1.25rem;
            color: #0f172a;
        }
        p { color: #475569; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .grid button {
            padding: 20px;
            font-size: 24px;
            border: 2px solid #cbd5e1;
            border-radius: .5rem;
            cursor: pointer;
            background: white;
        }
        .grid button:hover { border-color: #4f46e5; }
        .selected { display: flex; gap: 8px; margin: 10px 0; min-height: 40px; flex-wrap: wrap; }
        .selected span { background: #e0e7ff; color: #4338ca; padding: 4px 12px; border-radius: .5rem; }
        form { text-align: center; }
        input[type="text"] {
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: .5rem;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,.15);
        }
        button[type="submit"] {
            padding: 12px 40px;
            font-size: 16px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: .5rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            margin-top: 1.1rem;
        }
        button[type="submit"]:hover { background: #4338ca; }
        a { color: #4f46e5; text-decoration: none; display: block; margin-top: 20px; text-align: center; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Picture Password</h1>
        <form method="POST" action="/idp/login/picture">
            <input type="text" name="username" placeholder="Username" required>
            <p>Select your pictures in order:</p>
            <div class="grid">
                {% for pic in pictures %}
                <button type="button" onclick="addPicture('{{ pic }}')">{{ pic }}</button>
                {% endfor %}
            </div>
            <div class="selected" id="selected"></div>
            <input type="hidden" name="image_sequence" id="image_sequence" value="">
            <button type="submit">Sign In</button>
        </form>
        <a href="/idp/login">Back to Login</a>
    </div>
    <script>
        let sequence = [];
        function addPicture(pic) {
            sequence.push(pic);
            document.getElementById('image_sequence').value = sequence.join(',');
            const el = document.getElementById('selected');
            const span = document.createElement('span');
            span.textContent = pic;
            el.appendChild(span);
        }
    </script>
</body>
</html>
